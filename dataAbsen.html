<script>
function waktuIndonesia(){

    const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const bulan = ["Januari","Februari","Maret","April","Mei","Juni",
                   "Juli","Agustus","September","Oktober","November","Desember"];

    const sekarang = new Date();

    let h = hari[sekarang.getDay()];
    let t = sekarang.getDate();
    let b = bulan[sekarang.getMonth()];
    let th = sekarang.getFullYear();

    let jam = String(sekarang.getHours()).padStart(2,'0');
    let menit = String(sekarang.getMinutes()).padStart(2,'0');
    let detik = String(sekarang.getSeconds()).padStart(2,'0');

    document.getElementById("jam").innerHTML =
        h + ", " + t + " " + b + " " + th + "<br>" +"pkl. " +
        jam + ":" + menit + ":" + detik + " wib";
}

setInterval(waktuIndonesia,1000);
</script>

</head>
 <div class="top-bar">

<table>

<thead>

</tr>

<tbody id="isiData">
</tbody>
<script type="module">

 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  
  // Your web app's Firebase configuration
            const firebaseConfig = {
               apiKey: "AIzaSyC0D0j5H_er4TYdRdQj7xqCiTCSas30YY0",
            authDomain: "backuptransksi.firebaseapp.com",
            databaseURL: "https://backuptransksi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "backuptransksi",
            storageBucket: "backuptransksi.firebasestorage.app",
            messagingSenderId: "205255091131",
            appId: "1:205255091131:web:05bb8036f0d93cbf621a9e",
            measurementId: "G-QFJDCS967X"
            };


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const now = new Date();
const pukul = "pkl. ";
const wib = " .wib";
const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();

const dbRef = ref(db,"backup/");

onValue(dbRef, (snapshot) => {

    const data = snapshot.val();
    let no = 1;
    let html = "";

    // ubah object jadi array biar bisa di-sort
    let arr = Object.keys(data).map(key => {

        let tgl, bln, thn;

        if (key.length === 7) {
            tgl = key.substring(0,1);
            bln = key.substring(1,3);
            thn = key.substring(3);
        } else if (key.length === 8) {
            tgl = key.substring(0,2);
            bln = key.substring(2,4);
            thn = key.substring(4);
        }

        return {
            key,
            tgl: parseInt(tgl),
            bln: parseInt(bln),
            thn: parseInt(thn)
        };
    });

    // SORT: tahun -> bulan -> tanggal
    arr.sort((a, b) => {
        if (a.thn !== b.thn) return a.thn - b.thn;
        if (a.bln !== b.bln) return a.bln - b.bln;
        return a.tgl - b.tgl;
    });

    // tampilkan ke tabel
    arr.forEach(item => {

        let formatTanggal = `${item.tgl}/${String(item.bln).padStart(2,'0')}/${item.thn}`;

        html += `
        <tr>
            <td style="text-align:center;">${no}</td>
            <td style="text-align:center;">${formatTanggal}</td>
            <td style="text-align:center;">
                <a href="PeriodeHadir.html?periode=${item.key}" target="_blank">
                    <button style="
                        padding:6px 14px;
                        background:#2196F3;
                        color:white;
                        border:none;
                        border-radius:6px;
                        cursor:pointer;
                        font-size:14px;
                        transition:0.3s;
                    " 
                    onmouseover="this.style.background='#1976D2'" 
                    onmouseout="this.style.background='#2196F3'">
                        Lihat
                    </button>
                </a>
            </td>
        </tr>
        `;
        no++;
    });

    document.getElementById("isiData").innerHTML = html;

});


// fitur cari nama
document.getElementById("searchInput").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#isiData tr");

    rows.forEach(function(row) {
        let nama = row.children[1].innerText.toLowerCase(); // kolom nama

        if (nama.includes(filter)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
});
</script>
