<script>
function waktuIndonesia(){

    const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const bulan = ["Januari","Februari","Maret","April","Mei","Juni",
                   "Juli","Agustus","September","Oktober","November","Desember"];

    const sekarang = new Date();

    let h = hari[sekarang.getDay()];
    let t = sekarang.getDate();
    let b = bulan[sekarang.getMonth()];
    let th = sekarang.getFullYear();

    let jam = String(sekarang.getHours()).padStart(2,'0');
    let menit = String(sekarang.getMinutes()).padStart(2,'0');
    let detik = String(sekarang.getSeconds()).padStart(2,'0');

    document.getElementById("jam").innerHTML =
        h + ", " + t + " " + b + " " + th + "<br>" +"pkl. " +
        jam + ":" + menit + ":" + detik + " wib";
}

setInterval(waktuIndonesia,1000);
</script>

window.downloadExcel = function () {

    if (allData.length === 0) {
        alert("Data kosong!");
        return;
    }

    // format data untuk excel
    let dataExcel = allData.map((item, index) => {
        return {
            No: index + 1,
            Tanggal: item.date || "-",
            Nama: item.nama || "-",
            "Jam Masuk": item.waktu || "-",
            "Jam Pulang": item.pulang || "-"
        };
    });

    // buat worksheet
    const ws = XLSX.utils.json_to_sheet(dataExcel);

    // buat workbook
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data Absen");

    // download file
    XLSX.writeFile(wb, "Data_Absen.xlsx");
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const urlParams = new URLSearchParams(window.location.search);
const periode = urlParams.get('periode');

document.write("Data Periode: " + periode);

const now = new Date();
const pukul = "pkl. ";
const wib = " .wib";
const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();
let currentPage = 1;
let rowsPerPage = 10; // jumlah data per halaman
let allData = [];
let filteredData = [];



document.getElementById("searchInput").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();

    filteredData = allData.filter(item => 
        item.nama.toLowerCase().includes(filter)
    );

    currentPage = 1; // reset ke halaman awal
    renderTable();
});

const dbRef = ref(db, "absen/" + periode);

onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    console.log(data);


    if (!data) {
        document.getElementById("isiData").innerHTML = `
        <tr>
            <td colspan="5" style="text-align:center; padding:10px;">
                Data Belum Tersedia !
            </td>
        </tr>`;
        return;
    }

    // 🔥 PINDAHKAN KE SINI
    allData = Object.values(data);
    filteredData = allData;
    currentPage = 1;

    renderTable();
});

    function renderTable() {

    let start = (currentPage - 1) * rowsPerPage;
   let end = start + rowsPerPage;
   let paginatedData = filteredData.slice(start, end);

    let html = "";
    let no = start + 1;

    paginatedData.forEach(item => {
        html += `
        <tr>
         <td style="text-align:center;">${no}</td>
          <td style='text-align:center;'>${item.date}</td>
         <td style='text-align:center;'>
            <img src="${item.photo}" class="photoTable" onclick="previewFoto(this.src)">
         </td>
         <td style='text-align:center;'>${item.nama}</td>
         <td style='text-align:center;'>
    <span class="badge masuk">
        ${item.waktu ? item.waktu : "-"}
    </span>
</td>

<td style='text-align:center;'>
    <span class="badge ${item.pulang === "-" ? "belum" : "pulang"}">
        ${item.pulang === "-" ? "- " : item.pulang}
    </span>
</td>
        </tr>
        `;
        no++;
    });

    document.getElementById("isiData").innerHTML = html;

    renderPagination();
}

function renderPagination() {

   const totalPages = Math.ceil(filteredData.length / rowsPerPage);

   let html = `
    <button class="btn-prev" onclick="prevPage()" ${currentPage === 1 ? "disabled" : ""}>Prev</button>
    Halaman ${currentPage} / ${totalPages}
    <button class="btn-next" onclick="nextPage()" ${currentPage === totalPages ? "disabled" : ""}>Next</button>
`;

    document.getElementById("pagination").innerHTML = html;
}

function nextPage() {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        renderTable();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderTable();
    }
}

window.nextPage = function() {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        renderTable();
    }
}

window.prevPage = function() {
    if (currentPage > 1) {
        currentPage--;
        renderTable();
    }
}
</script>
<script>
function downloadExcel() {
    let table = document.querySelector("table");
    let html = table.outerHTML;

    let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);

    let link = document.createElement("a");
    link.href = url;
    link.download = "data_absen.xls";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
